services:
  crawler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: english-crawler
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - APP_ENV=production
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./data/crawl_output:/app/data/crawl_output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - english-network

  redis:
    image: redis:7-alpine
    container_name: english-crawler-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - english-network

networks:
  english-network:
    name: englishlearningplatform_english-learning-dev
    external: true

volumes:
  redis-data:
