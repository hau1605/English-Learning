name: CD

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-for-cd-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-cd-32-characters
        run: npm run test:cov
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        uses: ./.github/actions/deploy
        with:
          environment: staging
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run smoke tests on staging
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          test -n "$STAGING_API_URL"
          curl --fail --silent --show-error --retry 5 --retry-delay 5 "$STAGING_API_URL/health"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production
      url: https://app.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: ./.github/actions/deploy
        with:
          environment: production
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run smoke tests on production
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          test -n "$PRODUCTION_API_URL"
          curl --fail --silent --show-error --retry 5 --retry-delay 5 "$PRODUCTION_API_URL/health"

      - name: Create rollback snapshot
        if: failure()
        run: |
          aws ecs describe-services \
            --cluster elp-production-cluster \
            --services elp-production-api \
            --query 'services[0].taskDefinition' \
            --output text > previous-task-definition.txt

  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure()
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Rollback to previous version
        run: |
          aws ecs update-service \
            --cluster elp-production-cluster \
            --service elp-production-api \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
